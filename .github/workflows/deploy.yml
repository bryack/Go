name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build HTTP server Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            bin_to_build=server
          tags: task-manager-http:latest

      - name: Build gRPC server Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            bin_to_build=grpcserver
          tags: task-manager-grpc:latest
