# Grafana Loki Stack for Task Manager API
#
# This Docker Compose file runs the complete Grafana Loki logging stack:
# - Task Manager HTTP API
# - Task Manager gRPC Server
# - Loki (log aggregation and storage)
# - Grafana (web UI for querying and visualizing logs)
#
# Usage:
#   Start:  docker compose -f docker-compose.loki.yml up -d
#   Stop:   docker compose -f docker-compose.loki.yml down
#   Logs:   docker compose -f docker-compose.loki.yml logs -f task-manager-http
#   Clean:  docker compose -f docker-compose.loki.yml down -v
#
# Access points:
#   - Grafana UI:  http://localhost:3000 (no login required)
#   - Loki API:    http://localhost:3100
#   - HTTP API:    http://localhost:8080
#   - gRPC API:    localhost:50051

services:
  # --- HTTP API Server with structured JSON logging ---
  task-manager-http:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        bin_to_build: server # Собираем cmd/server/main.go
    container_name: task-manager-http-loki
    ports:
      - "8080:8080"
    environment:
      TASKMANAGER_JWT_SECRET: "local-dev-secret-key-change-in-production-min-32-chars"
      TASKMANAGER_DATABASE_PATH: "/data/tasks.db"
      TASKMANAGER_SERVER_PORT: "8080"
      TASKMANAGER_LOGGING_FORMAT: "json"
      TASKMANAGER_LOGGING_OUTPUT: "stderr"
      TASKMANAGER_LOGGING_LEVEL: "info"
      TASKMANAGER_LOGGING_SERVICE_NAME: "task-manager-http"
      TASKMANAGER_LOGGING_ENVIRONMENT: "local"
    volumes:
      - ./data:/data
    depends_on:
      - loki
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "100"
        loki-retries: "2"
        loki-max-backoff: "1s"
        loki-timeout: "1s"
        labels: "service=task-manager,component=http,env=local"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- gRPC Server with structured JSON logging ---
  task-manager-grpc:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        bin_to_build: grpcserver # Собираем cmd/grpcserver/main.go
    container_name: task-manager-grpc-loki
    ports:
      - "50051:50051"
    environment:
      TASKMANAGER_JWT_SECRET: "local-dev-secret-key-change-in-production-min-32-chars"
      TASKMANAGER_DATABASE_PATH: "/data/tasks.db"
      TASKMANAGER_GRPC_PORT: "50051"
      TASKMANAGER_LOGGING_FORMAT: "json"
      TASKMANAGER_LOGGING_OUTPUT: "stderr"
      TASKMANAGER_LOGGING_LEVEL: "info"
      TASKMANAGER_LOGGING_SERVICE_NAME: "task-manager-grpc"
      TASKMANAGER_LOGGING_ENVIRONMENT: "local"
    volumes:
      - ./data:/data
    depends_on:
      - loki
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "100"
        loki-retries: "2"
        loki-max-backoff: "1s"
        loki-timeout: "1s"
        labels: "service=task-manager,component=grpc,env=local"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Loki - Log aggregation system
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  # Grafana - Visualization and query interface
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

# Named volumes for persistent storage
volumes:
  loki-data:
  grafana-data:

# Quick Start Guide:
#
# 1. Install Docker Loki plugin (required):
#    docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions
#
# 2. Start the stack:
#    docker compose -f docker-compose.loki.yml up -d
#
# 3. Wait for services to start (10 seconds):
#    sleep 10
#
# 4. Verify services are running:
#    docker compose -f docker-compose.loki.yml ps
#
# 5. Generate some logs:
#    curl http://localhost:8080/health
#
# 6. Configure Loki data source in Grafana (one-time setup):
#    - Open http://localhost:3000 in your browser
#    - Click "Connections" in the left sidebar
#    - Click "Data sources"
#    - Click "Add data source"
#    - Select "Loki"
#    - Set URL to: http://loki:3100
#    - Click "Save & test" (should show "Data source connected")
#
# 7. Explore logs:
#    - Click "Explore" (compass icon) in the left sidebar
#    - Loki should be selected as the data source
#    - Try query: {component="http"}
#    - Try query: {component="grpc"}
#    - Try query: {service="task-manager"} | json | level="INFO"
#
# 8. Stop the stack:
#    docker compose -f docker-compose.loki.yml down
