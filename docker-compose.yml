version: '3.8'

services:
  # --- HTTP API Server ---
  task-manager-http:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        bin_to_build: server # Собираем cmd/server/main.go
    container_name: task-manager-http
    ports:
      - "8080:8080"
    environment:
      # ⚠️  SECURITY: Change this to a secure secret in production!
      TASKMANAGER_JWT_SECRET: "development-secret-change-in-production-min32chars"
      TASKMANAGER_DATABASE_PATH: "/data/tasks.db"
      TASKMANAGER_SERVER_PORT: "8080"
      TASKMANAGER_LOGGING_LEVEL: "info"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- gRPC Server ---
  task-manager-grpc:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        bin_to_build: grpcserver # Собираем cmd/grpcserver/main.go
    container_name: task-manager-grpc
    ports:
      - "50051:50051"
    environment:
      # ⚠️  SECURITY: Change this to a secure secret in production!
      TASKMANAGER_JWT_SECRET: "development-secret-change-in-production-min32chars"
      TASKMANAGER_DATABASE_PATH: "/data/tasks.db"
      TASKMANAGER_GRPC_PORT: "50051"
      TASKMANAGER_LOGGING_LEVEL: "info"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
